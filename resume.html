<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
      color: #333;
    }
    form {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #333;
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #555;
    }
    .resume {
      border-top: 2px solid #333;
      padding-top: 20px;
    }
    .resume-section {
      margin-bottom: 20px;
    }
    .resume-section h3 {
      margin-bottom: 10px;
      color: #444;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resume Builder</h1>
    <form id="resumeForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="contact">Contact Information</label>
      <input type="text" id="contact" required>

      <label for="summary">Career Summary</label>
      <textarea id="summary" rows="3"></textarea>

      <label for="education">Education</label>
      <textarea id="education" rows="3"></textarea>

      <label for="experience">Work Experience</label>
      <textarea id="experience" rows="3"></textarea>

      <label for="skills">Skills</label>
      <textarea id="skills" rows="3"></textarea>

      <label for="projects">Projects/Certifications</label>
      <textarea id="projects" rows="3"></textarea>

      <button type="button" onclick="generateResume()">Create Resume</button>
    </form>

    <div class="resume" id="resumeOutput"></div>
  </div>

  <script>
    function generateResume() {
      const name = document.getElementById('name').value;
      const contact = document.getElementById('contact').value;
      const summary = document.getElementById('summary').value;
      const education = document.getElementById('education').value;
      const experience = document.getElementById('experience').value;
      const skills = document.getElementById('skills').value;
      const projects = document.getElementById('projects').value;

      const resumeHTML = `
        <h2>${name}</h2>
        <p><strong>Contact:</strong> ${contact}</p>
        <div class="resume-section">
          <h3>Summary</h3>
          <p>${summary}</p>
        </div>
        <div class="resume-section">
          <h3>Education</h3>
          <p>${education}</p>
        </div>
        <div class="resume-section">
          <h3>Work Experience</h3>
          <p>${experience}</p>
        </div>
        <div class="resume-section">
          <h3>Skills</h3>
          <p>${skills}</p>
        </div>
        <div class="resume-section">
          <h3>Projects/Certifications</h3>
          <p>${projects}</p>
        </div>
      `;

      document.getElementById('resumeOutput').innerHTML = resumeHTML;
    }
  </script>
</body>
</html>
